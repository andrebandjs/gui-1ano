<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obrigado - Convite Guilherme</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="sky-scene" aria-hidden="true"></div>

      <main class="experience tool-experience" aria-labelledby="thanks-title">
        <section class="tool-stage" aria-label="Confirmação enviada">
          <article class="invite-frame">
            <div class="paper thanks-paper">
              <div class="title-art" aria-hidden="true">
                <img src="assets/images/title-guilherme.png" alt="" />
              </div>

              <div class="ornament" aria-hidden="true">
                <img src="assets/images/divider-line.svg" alt="" />
                <img class="heart" src="assets/images/heart.svg" alt="" />
                <img src="assets/images/divider-line.svg" alt="" />
              </div>

              <h1 id="thanks-title" class="thanks-title">Obrigado!</h1>
              <p class="thanks-copy">Sua confirmação foi enviada com sucesso.</p>
              <p class="thanks-copy">Estamos muito felizes em comemorar o primeiro aninho do Guilherme com você.</p>

              <a class="visit-link back-link" href="index.html">Voltar ao Convite</a>
            </div>
          </article>
        </section>

        <footer class="footer">
          Aniversário de 1 ano do Guilherme Mello Bandarra - Todos direitos reservados ® 2026
        </footer>
      </main>
    </div>
  </body>
</html>
